services:
  back_svc:
    container_name: ecommerce_backend
    restart: unless-stopped
    build: ./backend/ # dockerfile path
    depends_on:
      - mongodb
    environment:
      MONGO_URI : "mongodb://mongodb:27017/mern_ecommerce"
      SECRET_KEY: "mine_secret_key"
      ORIGIN: "http://front_svc:3000"
      EMAIL: "abdogomaa0155208@gmail.com"
      PASSWORD: "your-email-password"

      LOGIN_TOKEN_EXPIRATION: "30d"  # Days
      OTP_EXPIRATION_TIME: "120000"  # Milliseconds
      PASSWORD_RESET_TOKEN_EXPIRATION: "2m"  # Minutes
      COOKIE_EXPIRATION_DAYS: "30"    # Days

      PRODUCTION: "false"

    networks:
      - back_net
  front_svc:
    container_name: ecommerce_front
    restart: unless-stopped
    build: ./frontend # frontend dockerfile
    depends_on:
      - back_svc
    environment:
      REACT_APP_BASE_URL: "http://back_svc:8000"

    ports:
      - "3000:3000"
    networks:
      - front_net

  mongodb:
    container_name: ecommerce_db
    restart: unless-stopped
    image: mongo:latest

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: "mern_ecommerce"

    networks:
      - back_net
    volumes:
      - db_data:/data/db

networks:
  front_net:
    driver: bridge

  back_net:
    driver: bridge


volumes:
  db_data:
